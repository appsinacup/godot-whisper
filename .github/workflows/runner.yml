name: Build GDExtension

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup clang-format
        shell: bash
        run: |
          python -m pip install clang-format==16.0.6
      - name: Run clang-format
        shell: bash
        run: |
          files=$(git ls-files -- '*.h' '*.cpp' ':!thirdparty')
          if [ ! -z "$files" ]; then
            clang-format --Wno-error=unknown --dry-run --Werror $files
          fi

  build:
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        target:
          [
            { platform: linux, arch: x86_64, os: ubuntu-24.04 },
            { platform: windows, arch: x86_64, os: windows-latest },
            { platform: macos, arch: universal, os: macos-latest },
            { platform: android, arch: arm64, os: ubuntu-24.04 },
            { platform: android, arch: arm32, os: ubuntu-24.04 },
            { platform: android, arch: x86_64, os: ubuntu-24.04 },
            { platform: android, arch: x86_32, os: ubuntu-24.04 },
            { platform: ios, arch: arm64, os: macos-latest },
            { platform: web, arch: wasm32, os: ubuntu-latest },
          ]
        target-type: [template_release]
        float-precision: [single, double]
        # WebGPU builds disabled — emdawnwebgpu API doesn't match whisper.cpp's ggml-webgpu yet
        # include:
        #   - target: { platform: web, arch: wasm32, os: ubuntu-latest, gpu: webgpu }
        #     target-type: template_release
        #     float-precision: single
        #   - target: { platform: web, arch: wasm32, os: ubuntu-latest, gpu: webgpu }
        #     target-type: template_release
        #     float-precision: double
    runs-on: ${{ matrix.target.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Vulkan SDK (Linux)
        if: ${{ matrix.target.platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev glslc

      - name: Install Vulkan SDK (Windows)
        if: ${{ matrix.target.platform == 'windows' }}
        uses: jakoch/install-vulkan-sdk-action@v1.0.4
        with:
          vulkan_version: 1.3.296.0
          install_runtime: false

      - name: GDExtension Build (Linux)
        if: ${{ matrix.target.platform == 'linux' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        with:
          platform: ${{ matrix.target.platform }}
          arch: ${{ matrix.target.arch }}
          float-precision: ${{ matrix.float-precision }}
          build-target-type: ${{ matrix.target-type }}

      - name: GDExtension Build (Android)
        if: ${{ matrix.target.platform == 'android' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        with:
          platform: ${{ matrix.target.platform }}
          arch: ${{ matrix.target.arch }}
          float-precision: ${{ matrix.float-precision }}
          build-target-type: ${{ matrix.target-type }}

      - name: GDExtension Build (Windows)
        if: ${{ matrix.target.platform == 'windows' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        env:
          VULKAN: "yes"
        with:
          platform: ${{ matrix.target.platform }}
          arch: ${{ matrix.target.arch }}
          float-precision: ${{ matrix.float-precision }}
          build-target-type: ${{ matrix.target-type }}

      - name: GDExtension Build (Apple)
        if: ${{ matrix.target.platform == 'macos' || matrix.target.platform == 'ios' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        with:
          platform: ${{ matrix.target.platform }}
          arch: ${{ matrix.target.arch }}
          float-precision: ${{ matrix.float-precision }}
          build-target-type: ${{ matrix.target-type }}

      - name: GDExtension Build (Web CPU)
        if: ${{ matrix.target.platform == 'web' && matrix.target.gpu != 'webgpu' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        with:
          platform: web
          arch: ${{ matrix.target.arch }}
          float-precision: ${{ matrix.float-precision }}
          build-target-type: ${{ matrix.target-type }}

      - name: GDExtension Build (Web WebGPU)
        if: ${{ matrix.target.platform == 'web' && matrix.target.gpu == 'webgpu' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        env:
          WEBGPU: "yes"
        with:
          platform: web
          arch: ${{ matrix.target.arch }}
          float-precision: ${{ matrix.float-precision }}
          build-target-type: ${{ matrix.target-type }}
          em_version: "4.0.10"

      - name: Set macOS precision extension
        if: ${{ matrix.target.platform == 'macos' && github.ref == 'refs/heads/main' }}
        id: macos_ext
        run: |
          if [ "${{ matrix.float-precision }}" = "double" ]; then
            echo "extension=.double" >> $GITHUB_OUTPUT
          else
            echo "extension=" >> $GITHUB_OUTPUT
          fi

      - name: Mac Sign
        if: ${{ matrix.target.platform == 'macos' && github.ref == 'refs/heads/main' }}
        uses: godotengine/godot-cpp-template/.github/actions/sign@f9564a9c8115139b9624692d39e358291f6d76ce
        with:
          FRAMEWORK_PATH: bin/addons/godot_whisper/bin/libgodot_whisper.macos.${{ matrix.target-type }}${{ steps.macos_ext.outputs.extension }}.universal.framework
          SIGN_FLAGS: "--deep"
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_DEV_PASSWORD: ${{ secrets.APPLE_DEV_PASSWORD }}
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_DEV_TEAM_ID: ${{ secrets.APPLE_DEV_TEAM_ID }}
          APPLE_DEV_APP_ID: ${{ secrets.APPLE_DEV_APP_ID }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot_Whisper-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.target.gpu || 'default' }}-${{ matrix.float-precision }}-${{ matrix.target-type }}
          path: |
            ${{ github.workspace }}/bin/**/*.so
            ${{ github.workspace }}/bin/**/*.dll
            ${{ github.workspace }}/bin/**/*.wasm
            ${{ github.workspace }}/bin/**/*.framework/**
            ${{ github.workspace }}/bin/addons/godot_whisper/ggml-metal.metal
            ${{ github.workspace }}/bin/addons/godot_whisper/bin/ggml-metal.metal
            ${{ github.workspace }}/bin/addons/godot_whisper/audio_stream_to_text.gd
            ${{ github.workspace }}/bin/addons/godot_whisper/capture_stream_to_text.gd
            ${{ github.workspace }}/bin/addons/godot_whisper/godot_whisper.gdextension
            ${{ github.workspace }}/bin/addons/godot_whisper/label_transcribe.gd
            ${{ github.workspace }}/bin/addons/godot_whisper/model_downloader.gd
            ${{ github.workspace }}/bin/addons/godot_whisper/plugin.cfg
            ${{ github.workspace }}/bin/addons/godot_whisper/whisper_dock.gd
            ${{ github.workspace }}/bin/addons/godot_whisper/whisper_dock.tscn
            ${{ github.workspace }}/bin/addons/godot_whisper/models/gglm-tiny.en.bin
            ${{ github.workspace }}/bin/samples/**
          if-no-files-found: error

  merge:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: Godot_Whisper
          pattern: Godot_Whisper-*
          delete-merged: true

  release:
    name: Create Release
    permissions:
      contents: write
    needs: [merge]
    uses: ./.github/workflows/release.yml
