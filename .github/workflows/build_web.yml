name: Build Web
on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU-only (default, compatible with emscripten 3.1.62)
          - precision: single
            arch: wasm32
            gpu: cpu
          - precision: double
            arch: wasm32
            gpu: cpu
          # WebGPU (requires emscripten 4.0+). Disabled until Godot supports emscripted 4.0+
          #- precision: single
          #  arch: wasm32
          #  gpu: webgpu
          #- precision: double
          #  arch: wasm32
          #  gpu: webgpu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: 🔗 GDExtension Build (CPU-only)
        if: ${{ matrix.gpu == 'cpu' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        with:
          platform: web
          arch: ${{ matrix.arch }}
          float-precision: ${{ matrix.precision }}
          build-target-type: template_release

      - name: 🔗 GDExtension Build (WebGPU)
        if: ${{ matrix.gpu == 'webgpu' }}
        uses: godotengine/godot-cpp-template/.github/actions/build@f9564a9c8115139b9624692d39e358291f6d76ce
        env:
          WEBGPU: "yes"
        with:
          platform: web
          arch: ${{ matrix.arch }}
          float-precision: ${{ matrix.precision }}
          build-target-type: template_release
          em_version: "4.0.10"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot_Whisper-web-${{ matrix.gpu }}-${{ matrix.precision }}
          path: |
            ${{ github.workspace }}/bin/**/*.wasm
          if-no-files-found: error
